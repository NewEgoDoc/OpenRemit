services:
  mysql:
    image: mysql:8.0
    container_name: openremit-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: openremit
      MYSQL_USER: openremit
      MYSQL_PASSWORD: openremit
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uopenremit", "-popenremit"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:
