spring:
  application:
    name: webhook-dispatcher
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://localhost:3306/openremit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: openremit
    password: openremit
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 다른 모듈과 같은 DB를 공유하지만 history 테이블은 분리 (ADR-011)
    table: flyway_schema_history_webhook
    baseline-on-migrate: true
    baseline-version: "0"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: webhook-dispatcher
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

openremit:
  webhook:
    target-url: ${WEBHOOK_TARGET_URL:http://localhost:9997/webhook}
    backoff:
      base-millis: 1000
      multiplier: 2.0
      max-attempts: 5
    poll-interval-millis: 1000

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
