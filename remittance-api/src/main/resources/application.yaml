spring:
  application:
    name: remittance-api
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/openremit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:openremit}
    password: ${DB_PASSWORD:openremit}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # 풀스택 모드(--profile app)에서 다른 모듈이 자기 마이그레이션을 먼저 실행해
    # 스키마가 비어있지 않은 상태가 되면 default baseline-on-migrate=false에서는
    # FlywayException이 발생. 다른 3개 모듈(payout/webhook/reconciler)의 패턴과
    # 동일하게 baseline 자동 생성. 모듈별 테이블 네임스페이스가 겹치지 않아
    # V1 이후의 CREATE TABLE 과 충돌하지 않음.
    baseline-on-migrate: true
    baseline-version: "0"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: remittance-api-payout-result
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

openremit:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-this-must-be-32+bytes}
    issuer: https://openremit.dev
    ttl: PT1H
  redis:
    address: ${REDIS_ADDRESS:redis://localhost:6379}
  fx:
    base-url: ${FX_BASE_URL:http://localhost:9999}
    cache:
      fresh-ttl: PT60S
      stale-ttl: PT24H

resilience4j:
  circuitbreaker:
    instances:
      fx-rate:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.openremit.api.infrastructure.fx.FxRateBadRequestException
  retry:
    instances:
      fx-rate:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
        ignore-exceptions:
          - com.openremit.api.infrastructure.fx.FxRateBadRequestException

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
