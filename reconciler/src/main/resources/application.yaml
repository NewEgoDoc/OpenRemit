spring:
  application:
    name: reconciler
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://localhost:3306/openremit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: openremit
    password: openremit
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # remittance-api와 같은 DB를 공유하지만 history 테이블은 분리 (ADR-011)
    table: flyway_schema_history_reconcile
    baseline-on-migrate: true
    baseline-version: "0"
  batch:
    jdbc:
      # Spring Batch 메타테이블 (BATCH_JOB_INSTANCE 등) 자동 생성
      initialize-schema: always
    job:
      # @Scheduled 트리거로만 실행. 부팅 시 자동 실행 방지.
      enabled: false

server:
  # 8083 은 docker-compose 의 Debezium 이 사용 — 충돌을 피해 8084.
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

openremit:
  reconcile:
    # 매일 04:00 정산 실행
    cron: "0 0 4 * * *"
