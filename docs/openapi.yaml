openapi: 3.0.3
info:
  title: OpenRemit API
  version: 0.1.0
  description: 송금 + 내부 결제 게이트웨이 백엔드 API
servers:
  - url: http://localhost:8080
    description: Local

tags:
  - name: auth
  - name: fx
  - name: wallets
  - name: payments
  - name: remittances

security:
  - bearerAuth: []

paths:
  /api/v1/auth/signup:
    post:
      tags: [auth]
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400': { $ref: '#/components/responses/Problem' }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: 로그인 (JWT 발급)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { $ref: '#/components/responses/Problem' }

  /api/v1/fx/quote:
    get:
      tags: [fx]
      summary: 환율 견적 조회
      parameters:
        - { name: from, in: query, required: true, schema: { $ref: '#/components/schemas/CurrencyCode' } }
        - { name: to, in: query, required: true, schema: { $ref: '#/components/schemas/CurrencyCode' } }
        - { name: amount, in: query, required: true, schema: { type: number, format: double } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FxQuote' }
        '503': { $ref: '#/components/responses/Problem' }

  /api/v1/wallets/me:
    get:
      tags: [wallets]
      summary: 내 지갑 조회
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Wallet' }

  /api/v1/wallets/me/transactions:
    get:
      tags: [wallets]
      summary: 내 거래 내역 조회 (cursor 페이징)
      parameters:
        - { name: cursor, in: query, schema: { type: string } }
        - { name: size, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WalletTransactionPage' }

  /api/v1/payments:
    post:
      tags: [payments]
      summary: 결제 승인
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '200':
          description: 멱등 재요청 — 캐시된 응답
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '409': { $ref: '#/components/responses/Problem' }

  /api/v1/payments/{id}:
    get:
      tags: [payments]
      summary: 결제 조회
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }
        '404': { $ref: '#/components/responses/Problem' }

  /api/v1/payments/{id}/cancel:
    post:
      tags: [payments]
      summary: 결제 취소 (부분 취소 가능)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CancelRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Payment' }

  /api/v1/remittances:
    post:
      tags: [remittances]
      summary: 송금 요청
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RemittanceRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Remittance' }
        '200':
          description: 멱등 재요청 — 캐시된 응답
        '400': { $ref: '#/components/responses/Problem' }
        '409': { $ref: '#/components/responses/Problem' }
    get:
      tags: [remittances]
      summary: 송금 이력 조회
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/RemittanceStatus' } }
        - { name: cursor, in: query, schema: { type: string } }
        - { name: size, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RemittancePage' }

  /api/v1/remittances/{id}:
    get:
      tags: [remittances]
      summary: 송금 조회
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Remittance' }

  /api/v1/remittances/{id}/cancel:
    post:
      tags: [remittances]
      summary: 송금 취소 (PROCESSING 이전 상태만)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Remittance' }
        '409':
          description: 취소 불가 상태
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: 24h 내 동일 키 재요청 시 캐시된 응답 반환

  responses:
    Problem:
      description: RFC 7807 Problem Details
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    CurrencyCode:
      type: string
      enum: [KRW, USD, JPY, PHP]

    RemittanceStatus:
      type: string
      enum: [REQUESTED, PAID, PROCESSING, COMPLETED, FAILED, CANCELLED]

    PaymentStatus:
      type: string
      enum: [APPROVED, CANCELLED, PARTIAL_CANCELLED]

    PaymentMethod:
      type: string
      enum: [CARD, BANK_TRANSFER]

    Problem:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }

    SignupRequest:
      type: object
      required: [email, password, name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer, example: 3600 }

    UserResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }

    FxQuote:
      type: object
      properties:
        from_currency: { $ref: '#/components/schemas/CurrencyCode' }
        to_currency: { $ref: '#/components/schemas/CurrencyCode' }
        from_amount: { type: number }
        to_amount: { type: number }
        fx_rate: { type: number }
        expires_at: { type: string, format: date-time }

    Wallet:
      type: object
      properties:
        id: { type: integer, format: int64 }
        currency: { $ref: '#/components/schemas/CurrencyCode' }
        balance: { type: number }
        updated_at: { type: string, format: date-time }

    WalletTransaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
        amount: { type: number, description: 양수=입금, 음수=출금 }
        balance_after: { type: number }
        reference_type: { type: string, enum: [REMITTANCE, PAYMENT, REFUND] }
        reference_id: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    WalletTransactionPage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WalletTransaction' }
        next_cursor: { type: string, nullable: true }

    PaymentRequest:
      type: object
      required: [amount, currency, method]
      properties:
        amount: { type: number }
        currency: { $ref: '#/components/schemas/CurrencyCode' }
        method: { $ref: '#/components/schemas/PaymentMethod' }

    Payment:
      type: object
      properties:
        id: { type: integer, format: int64 }
        amount: { type: number }
        currency: { $ref: '#/components/schemas/CurrencyCode' }
        method: { $ref: '#/components/schemas/PaymentMethod' }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        external_tx_id: { type: string }
        created_at: { type: string, format: date-time }

    CancelRequest:
      type: object
      properties:
        amount:
          type: number
          description: 미지정 시 전체 취소
        reason: { type: string }

    RemittanceRequest:
      type: object
      required: [from_currency, to_currency, from_amount, receiver_name, receiver_account, payment_id]
      properties:
        from_currency: { $ref: '#/components/schemas/CurrencyCode' }
        to_currency: { $ref: '#/components/schemas/CurrencyCode' }
        from_amount: { type: number }
        receiver_name: { type: string }
        receiver_account: { type: string }
        payment_id: { type: integer, format: int64 }

    Remittance:
      type: object
      properties:
        id: { type: integer, format: int64 }
        from_currency: { $ref: '#/components/schemas/CurrencyCode' }
        to_currency: { $ref: '#/components/schemas/CurrencyCode' }
        from_amount: { type: number }
        to_amount: { type: number }
        fx_rate: { type: number }
        receiver_name: { type: string }
        receiver_account: { type: string }
        status: { $ref: '#/components/schemas/RemittanceStatus' }
        payment_id: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RemittancePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Remittance' }
        next_cursor: { type: string, nullable: true }
